spring.application.name=tcb_server

# Maria DB
spring.datasource.url=jdbc:mariadb://${DB_HOST}:${DB_PORT}/${DB_NAME}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

# MyBatis
mybatis.mapper-locations=classpath:mapper/**/*.xml
mybatis.type-aliases-package=com.tcb_server
mybatis.configuration.map-underscore-to-camel-case=true

#schema.sql activation
spring.sql.init.mode=always
spring.sql.init.continue-on-error=true

# MyBatis SQL logging
logging.level.com.tcb_server.auth.mapper=DEBUG