<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>비밀번호 변경 - Tennis Admin</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      font-family: 'Noto Sans KR', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #f0f2f4;
    }

    .layout { display: flex; min-height: 100vh; }

    .brand-panel {
      position: fixed; top: 0; left: 0;
      width: 380px; height: 100vh;
      background: #263238;
      display: flex; flex-direction: column; justify-content: center;
      padding: 48px 44px; z-index: 10;
    }
    .brand-panel .brand-logo { font-size: 2rem; font-weight: 900; color: #fff; letter-spacing: .06em; margin-bottom: 12px; }
    .brand-panel .brand-sub  { font-size: .9rem; color: #90a4ae; line-height: 1.7; }
    .brand-panel .brand-divider { width: 36px; height: 3px; background: #546e7a; border-radius: 2px; margin: 24px 0; }
    .brand-panel .brand-desc { font-size: .82rem; color: #607d8b; line-height: 1.8; }

    .form-panel {
      margin-left: 380px; flex: 1;
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; padding: 40px 24px;
    }
    .form-box { width: 100%; max-width: 400px; }
    .form-title    { font-size: 1.5rem; font-weight: 800; color: #263238; margin-bottom: 6px; }
    .form-subtitle { font-size: .85rem; color: #90a4ae; margin-bottom: 32px; }

    .msg { border-radius: 8px; font-size: .84rem; padding: 11px 16px; margin-bottom: 20px; }
    .msg-error   { background: #ffebee; border: 1px solid #ef9a9a; color: #c62828; }
    .msg-success { background: #e8f5e9; border: 1px solid #a5d6a7; color: #2e7d32; }
    .msg-info    { background: #e3f2fd; border: 1px solid #90caf9; color: #1565c0; }

    .form-group { margin-bottom: 18px; }
    .form-group label {
      display: block; font-size: .8rem; font-weight: 700; color: #546e7a;
      margin-bottom: 7px; letter-spacing: .03em; text-transform: uppercase;
    }
    .label-row { display: flex; justify-content: space-between; align-items: center; }
    .timer { font-size: .85rem; color: #e53935; font-weight: 700; font-style: normal; }
    .timer.expired { color: #9e9e9e; }

    .form-group input {
      width: 100%; padding: 13px 16px;
      border: 1.5px solid #cfd8dc; border-radius: 8px;
      font-size: .95rem; font-family: inherit; color: #263238;
      background: #fff; outline: none;
      transition: border-color .2s, box-shadow .2s;
    }
    .form-group input:focus { border-color: #37474f; box-shadow: 0 0 0 3px rgba(55,71,79,.08); }
    .form-group input:disabled { background: #f5f5f5; color: #9e9e9e; cursor: not-allowed; }

    .submit-btn {
      width: 100%; padding: 14px;
      background: #263238; color: #fff; border: none; border-radius: 8px;
      font-size: .95rem; font-weight: 700; font-family: inherit;
      cursor: pointer; margin-top: 4px; transition: background .2s;
    }
    .submit-btn:hover { background: #37474f; }
    .submit-btn:disabled { background: #90a4ae; cursor: not-allowed; }

    .resend-btn {
      width: 100%; padding: 10px;
      background: transparent; color: #78909c;
      border: 1.5px solid #cfd8dc; border-radius: 8px;
      font-size: .85rem; font-family: inherit;
      cursor: pointer; margin-top: 10px; transition: all .2s;
    }
    .resend-btn:hover { border-color: #546e7a; color: #546e7a; }

    .step { display: none; }
    .step.active { display: block; }

    .step-indicator {
      display: flex; gap: 8px; margin-bottom: 28px;
    }
    .step-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: #cfd8dc; transition: background .3s;
    }
    .step-dot.active { background: #263238; }
    .step-dot.done   { background: #546e7a; }

    .form-links { display: flex; justify-content: center; margin-top: 24px; }
    .form-links a { font-size: .82rem; color: #78909c; text-decoration: none; transition: color .2s; }
    .form-links a:hover { color: #263238; }

    @media (max-width: 720px) {
      .brand-panel { display: none; }
      .form-panel  { margin-left: 0; }
    }
  </style>
</head>
<body>
<div class="layout">

  <aside class="brand-panel">
    <div class="brand-logo">Tennis</div>
    <div class="brand-sub">코치예약 관리 시스템</div>
    <div class="brand-divider"></div>
    <div class="brand-desc">예약 일정 관리, 코치 프로필 관리,<br>공지사항을 한 곳에서 관리하세요.</div>
  </aside>

  <main class="form-panel">
    <div class="form-box">

      <!-- 단계 표시 -->
      <div class="step-indicator">
        <div class="step-dot active" id="dot1"></div>
        <div class="step-dot" id="dot2"></div>
        <div class="step-dot" id="dot3"></div>
      </div>

      <!-- 임시 비밀번호 로그인 알림 (flash) -->
      <div th:if="${pwInfo}" class="msg msg-info" th:text="${pwInfo}"></div>

      <!-- Step 1: 아이디 + 이메일 입력 -->
      <div id="step1" class="step active">
        <div class="form-title">비밀번호 변경</div>
        <div class="form-subtitle">아이디와 이메일을 입력하면 인증번호를 발송합니다.</div>
        <div id="step1-error" class="msg msg-error" style="display:none;"></div>

        <div class="form-group">
          <label for="username">아이디</label>
          <input type="text" id="username" placeholder="아이디 입력" required autocomplete="username">
        </div>
        <div class="form-group">
          <label for="email">이메일</label>
          <input type="email" id="email" placeholder="이메일 입력" required autocomplete="email">
        </div>
        <button type="button" class="submit-btn" id="sendBtn" onclick="sendCode()">인증번호 발송</button>
      </div>

      <!-- Step 2: 인증번호 입력 -->
      <div id="step2" class="step">
        <div class="form-title">인증번호 확인</div>
        <div class="form-subtitle">이메일로 전송된 6자리 인증번호를 입력하세요.</div>
        <div id="step2-error" class="msg msg-error" style="display:none;"></div>
        <div id="step2-success" class="msg msg-success" style="display:none;">인증번호가 발송되었습니다.</div>

        <div class="form-group">
          <div class="label-row">
            <label for="code" style="margin-bottom:0;">인증번호</label>
            <span id="timer" class="timer">3:00</span>
          </div>
          <input type="text" id="code" placeholder="인증번호 6자리" maxlength="6"
                 inputmode="numeric" style="margin-top:7px;" required>
        </div>
        <button type="button" class="submit-btn" onclick="verifyCode()">인증번호 확인</button>
        <button type="button" class="resend-btn" onclick="resendCode()">인증번호 재발송</button>
      </div>

      <!-- Step 3: 새 비밀번호 입력 -->
      <div id="step3" class="step">
        <div class="form-title">새 비밀번호 설정</div>
        <div class="form-subtitle">변경할 새 비밀번호를 입력하세요.</div>
        <div id="step3-error" class="msg msg-error" style="display:none;"></div>

        <div class="form-group">
          <label for="newPassword">새 비밀번호</label>
          <input type="password" id="newPassword" placeholder="새 비밀번호 (8자 이상)" required autocomplete="new-password">
        </div>
        <div class="form-group">
          <label for="confirmPassword">새 비밀번호 확인</label>
          <input type="password" id="confirmPassword" placeholder="새 비밀번호 확인" required autocomplete="new-password">
        </div>
        <button type="button" class="submit-btn" onclick="resetPassword()">변경하기</button>
      </div>

      <div class="form-links">
        <a href="/admin/login">← 로그인으로 돌아가기</a>
      </div>
    </div>
  </main>

</div>

<script>
  let timerInterval = null;
  let timerExpired = false;

  function showError(step, msg) {
    const el = document.getElementById('step' + step + '-error');
    el.textContent = msg;
    el.style.display = 'block';
  }
  function hideError(step) {
    document.getElementById('step' + step + '-error').style.display = 'none';
  }

  function goToStep(n) {
    [1, 2, 3].forEach(i => {
      document.getElementById('step' + i).classList.toggle('active', i === n);
      const dot = document.getElementById('dot' + i);
      dot.className = 'step-dot' + (i === n ? ' active' : (i < n ? ' done' : ''));
    });
  }

  async function sendCode() {
    const username = document.getElementById('username').value.trim();
    const email = document.getElementById('email').value.trim();
    hideError(1);

    if (!username || !email) {
      showError(1, '아이디와 이메일을 모두 입력해주세요.');
      return;
    }

    const btn = document.getElementById('sendBtn');
    btn.disabled = true;
    btn.textContent = '발송 중...';

    try {
      const res = await fetch('/admin/change-password/send-code', {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: 'username=' + encodeURIComponent(username) + '&email=' + encodeURIComponent(email)
      });
      const data = await res.json();

      if (data.success) {
        goToStep(2);
        document.getElementById('step2-success').style.display = 'block';
        startTimer(180);
      } else {
        showError(1, data.message || '오류가 발생했습니다.');
      }
    } catch (e) {
      showError(1, '서버 연결에 실패했습니다. 잠시 후 다시 시도해주세요.');
    } finally {
      btn.disabled = false;
      btn.textContent = '인증번호 발송';
    }
  }

  async function verifyCode() {
    const email = document.getElementById('email').value.trim();
    const code = document.getElementById('code').value.trim();
    hideError(2);

    if (!code) {
      showError(2, '인증번호를 입력해주세요.');
      return;
    }
    if (timerExpired) {
      showError(2, '인증번호가 만료되었습니다. 재발송 후 다시 시도해주세요.');
      return;
    }

    try {
      const res = await fetch('/admin/change-password/verify-code', {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: 'email=' + encodeURIComponent(email) + '&code=' + encodeURIComponent(code)
      });
      const data = await res.json();

      if (data.success) {
        clearInterval(timerInterval);
        goToStep(3);
      } else {
        showError(2, data.message || '인증번호가 올바르지 않습니다.');
      }
    } catch (e) {
      showError(2, '서버 연결에 실패했습니다. 잠시 후 다시 시도해주세요.');
    }
  }

  async function resetPassword() {
    const email = document.getElementById('email').value.trim();
    const newPassword = document.getElementById('newPassword').value;
    const confirmPassword = document.getElementById('confirmPassword').value;
    hideError(3);

    if (!newPassword) {
      showError(3, '새 비밀번호를 입력해주세요.');
      return;
    }
    if (newPassword.length < 8) {
      showError(3, '비밀번호는 8자 이상이어야 합니다.');
      return;
    }
    if (newPassword !== confirmPassword) {
      showError(3, '비밀번호가 일치하지 않습니다.');
      return;
    }

    try {
      const res = await fetch('/admin/change-password/reset', {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: 'email=' + encodeURIComponent(email) + '&newPassword=' + encodeURIComponent(newPassword)
      });
      const data = await res.json();

      if (data.success) {
        window.location.href = '/admin/login?pwChanged=1';
      } else {
        showError(3, data.message || '오류가 발생했습니다.');
      }
    } catch (e) {
      showError(3, '서버 연결에 실패했습니다. 잠시 후 다시 시도해주세요.');
    }
  }

  async function resendCode() {
    const username = document.getElementById('username').value.trim();
    const email = document.getElementById('email').value.trim();
    hideError(2);
    document.getElementById('step2-success').style.display = 'none';

    try {
      const res = await fetch('/admin/change-password/send-code', {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: 'username=' + encodeURIComponent(username) + '&email=' + encodeURIComponent(email)
      });
      const data = await res.json();

      if (data.success) {
        document.getElementById('code').value = '';
        document.getElementById('step2-success').style.display = 'block';
        startTimer(180);
      } else {
        showError(2, data.message || '재발송 실패. 잠시 후 다시 시도해주세요.');
      }
    } catch (e) {
      showError(2, '서버 연결에 실패했습니다.');
    }
  }

  function startTimer(seconds) {
    clearInterval(timerInterval);
    timerExpired = false;
    let remaining = seconds;
    updateTimerDisplay(remaining);

    timerInterval = setInterval(() => {
      remaining--;
      updateTimerDisplay(remaining);
      if (remaining <= 0) {
        clearInterval(timerInterval);
        timerExpired = true;
        const el = document.getElementById('timer');
        el.textContent = '만료됨';
        el.classList.add('expired');
      }
    }, 1000);
  }

  function updateTimerDisplay(seconds) {
    const m = Math.floor(seconds / 60);
    const s = seconds % 60;
    const el = document.getElementById('timer');
    el.textContent = m + ':' + String(s).padStart(2, '0');
    el.classList.remove('expired');
  }
</script>
</body>
</html>
